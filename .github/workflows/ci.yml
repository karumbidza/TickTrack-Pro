name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Placeholder values so `next build` can compile. Real secrets are
          # injected at deploy time; these must never be real credentials.
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci-placeholder
          CLERK_SECRET_KEY: sk_test_ci-placeholder
          DATABASE_URL: postgresql://user:pass@localhost:5432/ci
          R2_ACCOUNT_ID: ci
          R2_ACCESS_KEY_ID: ci
          R2_SECRET_ACCESS_KEY: ci
          R2_PUBLIC_URL: https://example.invalid
